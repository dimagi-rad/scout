pipeline: connect_sync
description: "Sync data from CommCare Connect"
version: "1.0"
provider: commcare_connect

sources:
  - name: visits
    description: "User visit records with form data"
  - name: users
    description: "FLW/worker roster"
    # Mutable rows (usernames, suspension status) — full DROP/CREATE/INSERT
    # every run; do not resume from a partial-page watermark (issue #187).
    resumable: false
  # The v2 export serializers for the resources below do not emit a per-row
  # `id`, so there is no integer watermark to keyset-resume from. Like `users`,
  # they do a full DROP/CREATE/INSERT every run and use a surrogate identity PK.
  - name: completed_works
    description: "Completed work records"
    resumable: false
  - name: payments
    description: "Payment records"
    resumable: false
  - name: invoices
    description: "Invoice records"
    resumable: false
  - name: assessments
    description: "Assessment results"
    resumable: false
  - name: completed_modules
    description: "Learn module completions"
    resumable: false

metadata_discovery:
  description: "Fetch opportunity detail and org/program structure from Connect API"

relationships:
  - from_table: raw_visits
    from_column: username
    to_table: raw_users
    to_column: username
    description: "Visits reference the FLW who performed them"
  - from_table: raw_completed_works
    from_column: username
    to_table: raw_users
    to_column: username
    description: "Completed works reference the FLW"
  - from_table: raw_payments
    from_column: username
    to_table: raw_users
    to_column: username
    description: "Payments reference the FLW who earned them"
  - from_table: raw_assessments
    from_column: username
    to_table: raw_users
    to_column: username
    description: "Assessments reference the FLW"
  - from_table: raw_completed_modules
    from_column: username
    to_table: raw_users
    to_column: username
    description: "Module completions reference the FLW"
