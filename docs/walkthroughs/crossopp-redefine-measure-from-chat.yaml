name: crossopp-redefine-measure-from-chat
narrative: 'Maya runs several KMC delivery opportunities and opens the infant growth curve she relies
  on — but the lightest babies'' line is flat, not climbing the way catch-up growth should, and she does
  not trust it. Instead of filing a ticket, she opens the curve''s lineage and reads, opportunity by opportunity,
  how each number was built: the age axis is reading a raw "child age" field that does not track real
  age. She tells Scout, in plain language, that age should be the days between the visit date and the
  child''s date of birth — and from the same inspector she edits the definition. Scout re-derives the
  measure as a formula across every opportunity, shows her the new SQL for each one — including the opportunity
  whose date-of-birth column is named differently — and asks her to confirm. She approves; the cube reloads
  on the spot — a definition change, not a data rebuild — and the curve she was staring at redraws itself
  into proper catch-up growth. She re-opens the lineage, sees the corrected definition, and walks away
  having fixed a metric herself, in the product.'
narrative_locked: true
