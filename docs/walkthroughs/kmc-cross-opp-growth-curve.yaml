name: kmc-cross-opp-growth-curve
narrative: 'Maya runs several KMC delivery opportunities and wants one thing she has
  never been able to get: an infant growth curve she can trust across all of them
  at once. The problem is that each opportunity runs a different CommCare app, so
  "birth weight" and "the baby''s weight at this visit" live under different field
  names in every one. Maya creates a brand-new Scout workspace, pools four KMC opportunities
  into it, and — with no measures and no model defined anywhere — simply asks Scout
  in chat to prepare the data and then to build the growth curve. Scout finds an empty
  semantic catalog, works out opportunity by opportunity which field means birth weight
  and which means the visit weight, and defines those as shared measures on the spot.
  It charts the curve straight from the cube semantic layer rather than hand-written
  SQL, and when Maya wants to know whether to believe a number she opens it and reads,
  opportunity by opportunity, the exact column and SQL it came from. Seeing the lightest
  babies'' line sit flatter than she expects, she traces it through that same lineage
  and decides for herself that it is the source data, not the model — and walks away
  with a curve she can defend.'
narrative_locked: true
