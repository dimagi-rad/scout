narrative_synced_version: 3
personas:
  amara:
    color: '#7C3AED'
    intro: Amara oversees eleven KMC delivery opportunities and wants to compare clinical
      outcomes across them; she knows the program cold but not how each CommCare app
      is built.
    name: Amara
    role: KMC Program Manager
review_mode: human
scenes:
- concept_claim: Scout shows the eleven KMC opportunities as separate sources that
    cannot yet be compared together.
  design_intent: Open on the real pain — fragmentation across structurally-different
    apps — before any feature appears.
  features:
  - description: Workspaces home page lists the user's available tenants/opportunities.
    id: workspaces-home
    verify: 'Playwright: load /, assert the 11 KMC opportunity names render in the
      source list'
  narrative: 'Amara opens Scout already knowing her problem: eleven KMC opportunities,
    each on a slightly different app, and no way to see weight gain or mortality across
    all of them at once.'
  persona: amara
  provenance: S1
  show: Land on the Scout workspaces home; the eleven KMC opportunities are visible
    as separate, unaligned sources.
  title: Amara has eleven opps she can't line up
  url: /workspaces
  actions:
  - { kind: wait_for, target: "Your workspaces" }
  - { kind: scroll_to, target: "Labs Opp 10012" }
  - { kind: hold, seconds: 2, note: "eleven separate Labs Opp workspaces, not yet comparable" }
- concept_claim: Amara composes eleven opportunities into one workspace and Scout
    provisions a combined view schema for them.
  design_intent: Reuse the existing multi-tenant composition so the demo rides proven
    machinery, not a rebuild.
  features:
  - description: Create-workspace flow that yields an empty workspace owned by the
      user.
    id: create-workspace
    verify: 'Playwright: click New Workspace, fill name ''KMC Cross-Opp'', assert
      workspace detail page loads'
  - description: Add multiple opportunities to a workspace via the add-tenant action
      (POST /api/workspaces/<id>/tenants/).
    id: add-tenants
    verify: 'pytest: POST 11 tenant_ids, assert WorkspaceViewSchema rebuild is queued
      and 11 WorkspaceTenant rows exist'
  narrative: Amara creates a new workspace, names it KMC Cross-Opp, and drops all
    eleven opportunities into it as a single set — Scout already lets her compose
    many opportunities into one workspace.
  persona: amara
  provenance: S9
  show: Create a new workspace, then add the 11 KMC opportunities to it as tenants.
  title: Amara pools all eleven into one workspace
  url: /workspaces/kmc-cross-opp/b357b50f-1776-4536-a8ed-52a55e60c5d7
  actions:
  - { kind: wait_for, target: "KMC Cross-Opp" }
  - { kind: click, target: "Data sources" }
  - { kind: wait_for, target: "11 connected sources" }
  - { kind: scroll_to, target: "Labs Opp 10022" }
  - { kind: hold, seconds: 2, note: "all eleven opps pooled into one workspace" }
- concept_claim: Amara names clinical outcomes in plain language and Scout records
    them as canonical measures without her referencing any field.
  design_intent: The expert speaks domain language; the canonical measure catalog
    is the vocabulary, not CommCare paths.
  features:
  - description: Workspace-scoped canonical measure catalog storing domain concepts
      (name, description, type, aggregation).
    id: canonical-measure-catalog
    verify: 'pytest: create CanonicalMeasure ''birth_weight'' on a workspace, assert
      it persists scoped to that workspace'
  - description: Agent turns a natural-language dashboard request into named canonical
      measures (weight gain, mortality, kangaroo-care hours, danger-sign referral
      rate).
    id: nl-prompt-to-measures
    verify: 'pytest: feed the prompt, assert >=4 canonical measures are created including
      weight_gain, mortality, kmc_hours and danger_sign_referral_rate'
  narrative: Amara types one plain-English request — a dashboard on weight gain, mortality,
    daily kangaroo-care hours, and the danger-sign referral rate — naming the outcomes
    she cares about, not any CommCare field.
  persona: amara
  provenance: S3
  show: Open the workspace chat and enter a natural-language prompt asking for a dashboard
    on weight gain, mortality, daily kangaroo-care hours, and the danger-sign referral
    rate, sliced sensibly.
  title: Amara asks for what she wants, in her own words
  url: /workspaces/kmc-cross-opp/b357b50f-1776-4536-a8ed-52a55e60c5d7/chat
  actions:
  - { kind: wait_for, target: "How can I assist you today?" }
  - { kind: click, target: "css:textarea" }
  - { kind: type, value: "Build a detailed dashboard on weight gain, mortality, daily kangaroo-care hours, and the danger-sign referral rate, sliced by opportunity." }
  - { kind: hold, seconds: 3, note: "Amara names the outcomes in plain language, no CommCare field" }
- concept_claim: Scout resolves each canonical measure to a per-opportunity SQL expression
    using question labels and form roles, with confidence shown.
  design_intent: Auto-modeling does the per-app understanding; labels and form/module
    role are the resolution signals.
  features:
  - description: Per-tenant LLM resolver mapping a canonical measure to a SQL expression
      over that tenant's stg_visits, grounded in label/form/module/case_type/type/options.
    id: measure-resolver
    verify: 'pytest: resolve birth_weight for opp 10012, assert it maps to the Double
      entry question child_weight_birth, not the DataBindOnly copy'
  - description: MeasureMapping model storing measure x tenant -> expression, confidence,
      provenance, override.
    id: mapping-store
    verify: 'pytest: assert a MeasureMapping row exists per (measure, tenant) with
      confidence and provenance populated'
  narrative: For every opportunity, Scout reads that app's questions and labels and
    works out which field is birth weight and which is child-alive — preferring the
    real entry question over a calculated copy.
  persona: amara
  provenance: S4
  show: Show the resolver mapping each canonical measure to a per-opportunity field,
    with confidence and the label it matched on.
  title: Scout finds each measure inside each different app
  url: /crossopp
  actions:
  - { kind: wait_for, target: "Cross-Opp Dashboard" }
  - { kind: click, target: "testid:domain-selector", note: "active workspace defaults to a demo; switch to KMC Cross-Opp" }
  - { kind: click, target: "testid:domain-item-b357b50f-1776-4536-a8ed-52a55e60c5d7" }
  - { kind: wait_for, target: "testid:crossopp-dashboard-table" }
  - { kind: scroll_to, target: "How each number was computed" }
  - { kind: click, target: "css:[data-testid='crossopp-measure-mortality'] button" }
  - { kind: wait_for, target: "Is the baby alive?" }
  - { kind: hold, seconds: 2.5, note: "resolver mapped mortality to child_alive per opp via the question label" }
- concept_claim: Scout aligns the same measure across opps that use different field
    names and flags the opp where it is genuinely absent.
  design_intent: Semantic resolution recovers exactly the measures a lexical name-match
    would drop (the 10/11 case).
  features:
  - description: 'Per-measure coverage view: which opps resolved, which are absent,
      the matched field per opp.'
    id: coverage-matrix
    verify: 'Playwright: open coverage for birth_weight, assert 10 opps show a mapped
      field and 1 shows ''absent'''
  narrative: Amara sees birth weight resolved for ten of the eleven opps even though
    the apps name and nest the field differently — the one app that never collected
    it is flagged, not silently dropped.
  persona: amara
  provenance: S2
  show: 'Show the coverage of birth_weight across opps: resolved in 10/11 with differing
    underlying field names, flagged absent in 1.'
  title: It works even where the apps share no column name
  actions:
  - { kind: scroll_to, target: "testid:crossopp-measure-birth_weight" }
  - { kind: click, target: "css:[data-testid='crossopp-measure-birth_weight'] button" }
  - { kind: wait_for, target: "resolved field" }
  - { kind: hold, seconds: 2.5, note: "same concept recovered across opps despite differing nested field paths" }
- concept_claim: Scout unions the eleven opps into one table aliased on shared canonical
    columns with opportunity_id on every row.
  design_intent: Aliasing each opp's expression to canonical names makes UNION ALL
    well-defined in the existing ws_<hash> schema.
  features:
  - description: Extend build_view_schema to emit per-tenant canonical aliased views
      + a UNION ALL over them in ws_<hash>.
    id: canonical-union-builder
    verify: 'pytest: build the union over 2 tenants with differently-named birth-weight
      fields, assert canonical_visits aligns and counts sum'
  narrative: Amara watches the eleven opportunities snap into one aligned set — every
    opp contributing the same canonical columns, so the numbers are finally comparable
    rather than eleven incompatible shapes.
  persona: amara
  provenance: S5
  show: 'Show the canonical union: one combined table where each row carries opportunity_id
    and the shared canonical measure columns.'
  title: Eleven opps line up in one comparable table
  actions:
  - { kind: scroll_to, target: "testid:crossopp-dashboard-table" }
  - { kind: hold, seconds: 2.5, note: "the union: every opp contributes the same canonical columns, one row each" }
- concept_claim: Amara sees weight gain and mortality compared across all eleven opportunities,
    sliced by opportunity, from one prompt.
  design_intent: One Cube model on the canonical union with opportunity_id as the
    comparison dimension answers the NL prompt.
  features:
  - description: One Cube model targeting ws_<hash>.canonical_visits with measures
      on canonical columns and opportunity_id dimension.
    id: crossopp-cube-model
    verify: 'cube_e2e: semantic_query for weight_gain and mortality grouped by opportunity_id
      returns one row per opp'
  - description: Shareable dashboard artifact rendering the requested indicators sliced
      by opportunity.
    id: dashboard-artifact
    verify: 'Playwright: assert the dashboard shows weight_gain + mortality + kmc_hours
      + danger_sign_referral_rate with an opportunity breakdown'
  narrative: Within a moment Amara is reading weight gain and mortality side by side
    across all eleven opportunities, broken out by opportunity, plus the daily kangaroo-care
    hours and danger-sign referral rate she asked for.
  persona: amara
  provenance: S6
  show: 'Render the cross-opp dashboard: weight gain, mortality, daily kangaroo-care
    hours, and the danger-sign referral rate as charts/tables sliced by opportunity_id.'
  title: Amara reads weight gain and mortality across all eleven
  actions:
  - { kind: scroll_to, target: "testid:crossopp-row-10019" }
  - { kind: hold, seconds: 2.5, note: "weight gain and mortality side by side across all eleven opps" }
- concept_claim: Each dashboard column is backed by a named canonical measure with
    a plain-language definition and a count of how many opportunities resolved it.
  design_intent: Trust starts with the vocabulary — show that every number traces
    to a defined concept, not an ad-hoc column the expert has to take on faith.
  features:
  - description: A "How each number was computed" panel listing every canonical measure
      with its plain-language description and an X/11 resolved coverage count.
    id: measure-catalog-panel
    verify: 'Playwright: scroll to the "How each number was computed" panel, assert
      the four canonical measures each show an X/11 resolved coverage count'
  narrative: Before she acts on the numbers, Amara opens the panel beneath the dashboard
    that names every measure in plain language and shows, for each, how many of the
    eleven opportunities resolved it.
  persona: amara
  provenance: S7
  show: Scroll to "How each number was computed"; show the four canonical measures,
    each with its coverage count (e.g. mortality resolved in 11 of 11 opportunities).
  title: Amara opens the catalog behind the numbers
  actions:
  - { kind: click, target: "css:[data-testid='crossopp-measure-birth_weight'] button", note: "collapse to the catalog of all four measures" }
  - { kind: scroll_to, target: "How each number was computed" }
  - { kind: hold, seconds: 2.5, note: "every number backed by a named measure with an X/11 resolved count" }
- concept_claim: Expanding a measure reveals, per opportunity, the app field it resolved
    to, the question label it matched on, and a confidence score.
  design_intent: Make the per-app divergence concrete — the same clinical concept,
    eleven differently-built apps, one matched human label and field for each.
  features:
  - description: 'Per-opp mapping table inside an expanded measure: opportunity, resolved
      field, matched question label, confidence, and SQL expression for each opp.'
    id: per-opp-mapping-table
    verify: 'Playwright: click the mortality measure, assert the expanded table shows
      11 opp rows each with a resolved field, a matched label, and a confidence value'
  narrative: She expands mortality and sees, opportunity by opportunity, which field
    each app used and the human question label Scout matched on — for instance the
    field child_alive matched on the question "Is the baby alive?".
  persona: amara
  provenance: S7
  show: Click the mortality measure; the per-opp table shows each opportunity's resolved
    field, the matched question label, and the confidence.
  title: Amara sees how each app resolved the same measure
  actions:
  - { kind: scroll_to, target: "testid:crossopp-measure-mortality" }
  - { kind: click, target: "css:[data-testid='crossopp-measure-mortality'] button" }
  - { kind: wait_for, target: "Is the baby alive?" }
  - { kind: hold, seconds: 3, note: "per-opp: resolved field, matched label, confidence" }
- concept_claim: One click reveals the generated Cube model — each opportunity's per-tenant
    SQL and the canonical expression Cube actually executes for the measure.
  design_intent: Remove the black box — the literal generated model, not a paraphrase,
    is one click from the figure so the expert can audit what really runs.
  features:
  - description: '"Show the generated Cube model" reveals the YAML model: per-opp
      Tier-1 cubes selecting from each tenant schema plus the canonical measure expressions.'
    id: generated-model-reveal
    verify: 'Playwright: click "Show the generated Cube model", assert a YAML block
      renders containing per-opp cube SQL that selects from each tenant schema'
  narrative: Amara clicks "Show the generated Cube model" and reads the exact SQL
    — each opportunity's cube selecting from its own schema, and the canonical expression
    such as child_alive = 'no' that defines the measure.
  persona: amara
  provenance: S7
  show: Click "Show the generated Cube model"; reveal the per-opp Tier-1 cube SQL
    and the canonical measure expression Cube runs.
  title: Amara reveals the exact SQL Cube runs
  actions:
  - { kind: scroll_to, target: "testid:crossopp-show-model" }
  - { kind: click, target: "testid:crossopp-show-model" }
  - { kind: wait_for, target: "testid:crossopp-model-yaml" }
  - { kind: scroll_to, target: "testid:crossopp-model-yaml" }
  - { kind: hold, seconds: 3, note: "the exact generated Cube model: per-opp SQL + canonical expression" }
- concept_claim: Amara traces a single figure to the field, label, and SQL that produced
    it, confirming the number rather than trusting it.
  design_intent: Close the loop — the inspection ends by matching the resolved field
    and SQL back to the exact dashboard cell, turning a plausible number into a confirmed
    one.
  features:
  - description: The resolved field and SQL expression shown for an opportunity match
      the value rendered in that opportunity's row of the dashboard table.
    id: figure-to-sql-traceability
    verify: 'Playwright: read the mortality value for opp 10012 in the dashboard table,
      assert the inspector shows opp 10012 resolved to child_alive with a matching
      SQL expression'
  narrative: With the field and SQL in front of her, Amara matches them back to the
    mortality figure for opp 10012 in the table — the number is confirmed, not taken
    on faith, and she is ready to share it.
  persona: amara
  provenance: S7
  show: Match the resolved field and SQL expression for opp 10012 back to its mortality
    figure in the dashboard table.
  title: Amara matches the SQL back to the number
  actions:
  - { kind: scroll_to, target: "testid:crossopp-model-yaml" }
  - { kind: hold, seconds: 2, note: "the SQL: (child_alive = 'no')" }
  - { kind: scroll_to, target: "testid:crossopp-dashboard-table" }
  - { kind: hold, seconds: 3, note: "match it back to opp 10012's mortality figure at the top of the table" }
- concept_claim: Amara confirms the dashboard reads only her eleven opportunities
    and shares it by a single stable link.
  design_intent: 'Production-real trust: DB-enforced isolation plus stable canonical
    identity make the shared artifact safe to act on.'
  features:
  - description: Cube connects via a workspace-scoped read-only role with USAGE only
      on the workspace's constituent schemas; a negative test proves a foreign-schema
      query is refused.
    id: least-privilege-role
    verify: 'pytest: a query for a schema outside the workspace''s tenants is refused,
      not returned'
  - description: A dashboard share link that renders the same cross-opp artifact for
      a teammate.
    id: shareable-dashboard-link
    verify: 'Playwright: open the share link in a fresh session, assert the same indicators
      and opportunity breakdown render'
  narrative: Amara confirms the numbers came only from her eleven opportunities and
    that the measure names she is about to circulate will not shift under her, then
    shares the dashboard with her team as one link.
  persona: amara
  provenance: S8
  show: Show the query scoped to only the workspace's 11 schemas (isolation) and stable
    measure ids, then share the dashboard link.
  title: Amara trusts it, then shares it
  actions:
  - { kind: scroll_to, target: "testid:crossopp-model-yaml" }
  - { kind: hold, seconds: 3, note: "each opp cube reads only its own schema (t_100XX_*) — DB-scoped isolation; canonical measure names are stable" }
