auth:
  type: session
base_url: http://localhost:5173
name: kmc-cross-opp-semantic-dashboard
narrative: Amara runs the KMC program's eleven delivery opportunities and walks in
  wanting to know where preterm babies are actually gaining weight and surviving —
  but every opportunity ran a slightly different CommCare app, so she has never been
  able to line them up. She logs into Scout, spins up a fresh workspace, and pools
  all eleven opportunities into it as one set. She asks, in plain English, for a dashboard
  on weight gain, mortality, daily kangaroo-care hours, and the danger-sign referral
  rate — and Scout works out, opportunity by opportunity, which field means "birth
  weight" and which means "child alive", aligning apps that share no column name.
  Within a moment she is reading weight gain and mortality side by side across all
  eleven opps, broken out by opportunity. Then, because she is about to act on it,
  she opens a number, sees the canonical measure it came from, how each opportunity
  resolved to its own field, and the exact SQL — and decides for herself whether to
  trust it before sharing it with her team.
narrative_locked: true
narrative_locked_at: '2026-06-19T22:59:13.061853+00:00'
