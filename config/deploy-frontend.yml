# Scout Frontend — Sole public entry point
# nginx serving React SPA, proxies /api/ and /admin/ to Django
#
# Requires: source .env.deploy (or run scripts/fetch-deploy-env.sh to generate it)

service: scout-frontend

image: scout/frontend

servers:
  web:
    hosts:
      - <%= ENV.fetch('SCOUT_EC2_IP') %>
    options:
      network: "scout_shared"
      network-alias: "scout-frontend-web"

registry:
  server: <%= ENV.fetch('SCOUT_ECR_REGISTRY') %>
  username: AWS
  password: <%= %x(./registry_password.sh) %>

ssh:
  user: scout

builder:
  arch: amd64
  dockerfile: Dockerfile.frontend
  args:
    NGINX_CONF: frontend/nginx.prod-kamal.conf

env:
  clear:
    # Populates the CSP frame-ancestors header on /embed/ responses so
    # approved hosts can iframe Scout. Comma-separated; normalized to spaces
    # for CSP by the frontend container's entrypoint. Keep in sync with
    # EMBED_ALLOWED_ORIGINS on the API side.
    EMBED_ALLOWED_ORIGINS: "https://labs.connect.dimagi.com"

proxy:
  host: scout.dimagi.com
  app_port: 3000
  ssl: true
  forward_headers: true
  healthcheck:
    interval: 5
    path: /
    timeout: 3

logging:
  driver: awslogs
  options:
    awslogs-region: us-east-1
    awslogs-group: /scout/frontend
    awslogs-create-group: "false"
    tag: "{{.Name}}"
