# Scout Procrastinate Worker
# No HTTP interface — runs background tasks and periodic scheduling
#
# Requires: source .env.deploy (or run scripts/fetch-deploy-env.sh to generate it)

service: scout-worker

image: scout/api

servers:
  web:
    hosts:
      - <%= ENV.fetch('SCOUT_EC2_IP') %>
    options:
      network: "scout_shared"
    cmd: "python manage.py procrastinate worker"
    proxy: false

registry:
  server: <%= ENV.fetch('SCOUT_ECR_REGISTRY') %>
  username: AWS
  password: <%= %x(./registry_password.sh) %>

env:
  clear:
    DJANGO_SETTINGS_MODULE: config.settings.production
    SENTRY_ENVIRONMENT: "production"
    SENTRY_TRACES_SAMPLE_RATE: "0.1"
    SENTRY_RELEASE: <%= ENV.fetch('IMAGE_TAG', '') %>
    # Required by resume_thread_after_materialization → get_mcp_tools.
    # Without this the worker falls back to localhost:8100 and every resume
    # task fails with httpx.ConnectError.
    MCP_SERVER_URL: "http://scout-mcp-web:8100/mcp"
    # Langfuse host for resume-task agent traces (keys come via secrets below).
    LANGFUSE_BASE_URL: "https://cloud.langfuse.com"
  secret:
    - DATABASE_URL
    - MANAGED_DATABASE_URL
    - DJANGO_SECRET_KEY
    - DB_CREDENTIAL_KEY
    - SENTRY_DSN
    # Required by ChatAnthropic in build_agent_graph for the resume task.
    - ANTHROPIC_API_KEY
    # Without these, the resume task's agent.ainvoke runs untraced — exactly
    # the blind spot that hid the original ConnectError for two failed runs.
    - LANGFUSE_SECRET_KEY
    - LANGFUSE_PUBLIC_KEY
    # Worker executes tasks and updates their Task Badger status; it also chains
    # the resume task, so it defers (creates) Task Badger records too.
    - TASKBADGER_API_KEY
    # The resume task's get_mcp_tools call authenticates to the MCP server with
    # this shared secret (arch #253, 01#6). MUST match deploy-mcp.yml.
    - MCP_SHARED_SECRET

ssh:
  user: scout

builder:
  arch: amd64

logging:
  driver: awslogs
  options:
    awslogs-region: us-east-1
    awslogs-group: /scout/worker
    awslogs-create-group: "false"
    tag: "{{.Name}}"

# No proxy — worker has no HTTP interface
