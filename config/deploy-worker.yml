# Scout Procrastinate Worker
# No HTTP interface — runs background tasks and periodic scheduling
#
# Requires: source .env.deploy (or run scripts/fetch-deploy-env.sh to generate it)

service: scout-worker

image: scout/api

servers:
  web:
    hosts:
      - <%= ENV.fetch('SCOUT_EC2_IP') %>
    options:
      network: "scout_shared"
    cmd: "python manage.py procrastinate worker"
    proxy: false

registry:
  server: <%= ENV.fetch('SCOUT_ECR_REGISTRY') %>
  username: AWS
  password: <%= %x(./registry_password.sh) %>

env:
  clear:
    DJANGO_SETTINGS_MODULE: config.settings.production
    SENTRY_ENVIRONMENT: "production"
    SENTRY_TRACES_SAMPLE_RATE: "0.1"
    SENTRY_RELEASE: <%= ENV.fetch('IMAGE_TAG', '') %>
  secret:
    - DATABASE_URL
    - MANAGED_DATABASE_URL
    - DJANGO_SECRET_KEY
    - DB_CREDENTIAL_KEY
    - SENTRY_DSN

ssh:
  user: scout

builder:
  arch: amd64

# No proxy — worker has no HTTP interface
