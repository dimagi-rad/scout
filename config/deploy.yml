# Scout Django API — Primary Kamal config
# Internal only (no proxy) — reached via nginx in frontend container
#
# Requires: source .env.deploy (or run scripts/fetch-deploy-env.sh to generate it)

service: scout

image: scout/api

servers:
  web:
    hosts:
      - <%= ENV.fetch('SCOUT_EC2_IP') %>
    options:
      network: "scout_shared"
      network-alias: "scout-web"
    # --no-access-log: uvicorn's access log writes the full request line —
    # including share tokens (/api/chat/threads/shared/<token>/,
    # /api/recipes/runs/shared/<token>/) and OAuth ?code= values — and ships it
    # to the /scout/api CloudWatch group (30-day retention), where any reader
    # could harvest live bearer capabilities (arch #257, finding 08#6). Django's
    # own logging never logged request paths, so disabling the access log drops
    # no signal we rely on. Errors/app logs are unaffected.
    cmd: "uvicorn config.asgi:application --host 0.0.0.0 --port 8000 --workers 4 --timeout-keep-alive 120 --lifespan off --no-access-log"
    proxy: false

registry:
  server: <%= ENV.fetch('SCOUT_ECR_REGISTRY') %>
  username: AWS
  password: <%= %x(./registry_password.sh) %>

env:
  clear:
    DJANGO_SETTINGS_MODULE: config.settings.production
    DJANGO_ALLOWED_HOSTS: "scout.dimagi.com"
    CSRF_TRUSTED_ORIGINS: "https://scout.dimagi.com"
    # Base URL for links in transactional email (workspace invite sign-in
    # links). Default is localhost — must be the public host in prod.
    SCOUT_BASE_URL: "https://scout.dimagi.com"
    # Send from the exact verified SES domain identity (dimagi.com), not the
    # scout.dimagi.com subdomain, for guaranteed DKIM/DMARC alignment.
    DEFAULT_FROM_EMAIL: "Scout <noreply@dimagi.com>"
    SECURE_SSL_REDIRECT: "False"
    MCP_SERVER_URL: "http://scout-mcp-web:8100/mcp"
    EMBED_ALLOWED_ORIGINS: "https://labs.connect.dimagi.com"
    MAX_CONNECTIONS_PER_PROJECT: 5
    MAX_QUERIES_PER_MINUTE: 60
    LANGFUSE_BASE_URL: "https://cloud.langfuse.com"
    SENTRY_ENVIRONMENT: "production"
    SENTRY_TRACES_SAMPLE_RATE: "0.1"
    SENTRY_RELEASE: <%= ENV.fetch('IMAGE_TAG', '') %>
  secret:
    - DATABASE_URL
    - MANAGED_DATABASE_URL
    # Shared ElastiCache endpoint (infra/scout-stack.yml RedisEndpoint output).
    # Backs the default Django cache so chat rate limiting + throttles are
    # consistent across the 4 uvicorn workers instead of per-process LocMemCache
    # (arch #254, finding 06#2). Unset -> falls back to LocMemCache.
    - REDIS_URL
    - DJANGO_SECRET_KEY
    - DB_CREDENTIAL_KEY
    - ANTHROPIC_API_KEY
    - LANGFUSE_SECRET_KEY
    - LANGFUSE_PUBLIC_KEY
    - COMMCARE_OAUTH_CLIENT_ID
    - COMMCARE_OAUTH_CLIENT_SECRET
    - CONNECT_OAUTH_CLIENT_ID
    - CONNECT_OAUTH_CLIENT_SECRET
    - OCS_OAUTH_CLIENT_ID
    - OCS_OAUTH_CLIENT_SECRET
    - SENTRY_DSN
    - TASKBADGER_API_KEY
    # Sent in X-Scout-MCP-Secret to authenticate to the MCP server (arch #253,
    # 01#6). MUST match deploy-mcp.yml's MCP_SHARED_SECRET.
    - MCP_SHARED_SECRET

ssh:
  user: scout

builder:
  arch: amd64

logging:
  driver: awslogs
  options:
    awslogs-region: us-east-1
    awslogs-group: /scout/api
    awslogs-create-group: "false"
    tag: "{{.Name}}"

# No proxy — API is internal only, reached via nginx in frontend container
