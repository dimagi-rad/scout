services:
  # Platform database (Django models, user data, project config)
  platform-db:
    image: postgres:16
    environment:
      POSTGRES_DB: agent_platform
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: ${PLATFORM_DB_PASSWORD:-devpassword}
    volumes:
      - platform_data:/var/lib/postgresql/data
    ports:
      - "${PLATFORM_DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d agent_platform"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # MCP data server (Scout agent data access layer)
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m mcp_server --transport streamable-http --host 0.0.0.0 --port 8100
    environment:
      - DATABASE_URL=postgresql://platform:${PLATFORM_DB_PASSWORD:-devpassword}@platform-db:5432/agent_platform
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DB_CREDENTIAL_KEY=${DB_CREDENTIAL_KEY}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-dev-secret-key-change-in-production}
      - CUBE_API_URL=http://cube:4000
      - CUBE_VALIDATOR_URL=http://cube:4010
      - CUBEJS_API_SECRET=${CUBEJS_API_SECRET:-dev-cube-secret-change-me}
    expose:
      - "8100"
    depends_on:
      platform-db:
        condition: service_healthy
      cube:
        condition: service_healthy
    restart: unless-stopped

  # Cube semantic query runtime
  cube:
    build:
      context: ./cube_config
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://platform:${PLATFORM_DB_PASSWORD:-devpassword}@platform-db:5432/agent_platform
      - MANAGED_DATABASE_URL=${MANAGED_DATABASE_URL:-postgresql://platform:${PLATFORM_DB_PASSWORD:-devpassword}@platform-db:5432/agent_platform}
      - CUBEJS_API_SECRET=${CUBEJS_API_SECRET:-dev-cube-secret-change-me}
      - CUBEJS_DEV_MODE=${CUBEJS_DEV_MODE:-true}
      - CUBEJS_TELEMETRY=false
      - CUBEJS_EXTERNAL_DEFAULT=false
      - CUBEJS_PRE_AGGREGATIONS_SCHEMA=false
      - CUBEJS_PORT=4000
      - CUBE_VALIDATOR_PORT=4010
    ports:
      - "${CUBE_PORT:-4000}:4000"
      - "${CUBE_VALIDATOR_PORT:-4010}:4010"
    depends_on:
      platform-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4000/readyz && curl -fsS http://localhost:4010/readyz"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  # Django API server (ASGI via uvicorn)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate &&
             uvicorn config.asgi:application --host 0.0.0.0 --port 8000 --workers 4 --timeout-keep-alive 120 --lifespan off"
    environment:
      - DATABASE_URL=postgresql://platform:${PLATFORM_DB_PASSWORD:-devpassword}@platform-db:5432/agent_platform
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DB_CREDENTIAL_KEY=${DB_CREDENTIAL_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DEFAULT_LLM_MODEL=${DEFAULT_LLM_MODEL:-claude-opus-4-8}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-dev-secret-key-change-in-production}
      - MCP_SERVER_URL=http://mcp-server:8100/mcp
      - MAX_CONNECTIONS_PER_PROJECT=5
      - CUBE_API_URL=http://cube:4000
      - CUBE_VALIDATOR_URL=http://cube:4010
      - CUBEJS_API_SECRET=${CUBEJS_API_SECRET:-dev-cube-secret-change-me}
    volumes:
      - ./apps:/app/apps
      - ./config:/app/config
      - static_files:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      platform-db:
        condition: service_healthy
      mcp-server:
        condition: service_started
      cube:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # React frontend (nginx serving SPA, proxying /api to Django)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  platform_data:
  static_files:
