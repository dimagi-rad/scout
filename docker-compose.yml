services:
  # Platform database (Django models, user data, project config)
  platform-db:
    image: postgres:16
    environment:
      POSTGRES_DB: agent_platform
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: ${PLATFORM_DB_PASSWORD:-devpassword}
    volumes:
      - platform_data:/var/lib/postgresql/data
    ports:
      - "${PLATFORM_DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d agent_platform"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # MCP data server (Scout agent data access layer)
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m mcp_server --transport streamable-http --host 0.0.0.0 --port 8100
    environment:
      - DATABASE_URL=postgresql://platform:${PLATFORM_DB_PASSWORD:-devpassword}@platform-db:5432/agent_platform
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DB_CREDENTIAL_KEY=${DB_CREDENTIAL_KEY}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-dev-secret-key-change-in-production}
    expose:
      - "8100"
    depends_on:
      platform-db:
        condition: service_healthy
    restart: unless-stopped

  # Django API server (ASGI via uvicorn)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate &&
             uvicorn config.asgi:application --host 0.0.0.0 --port 8000 --workers 4 --timeout-keep-alive 120 --lifespan off"
    environment:
      - DATABASE_URL=postgresql://platform:${PLATFORM_DB_PASSWORD:-devpassword}@platform-db:5432/agent_platform
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DB_CREDENTIAL_KEY=${DB_CREDENTIAL_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DEFAULT_LLM_MODEL=${DEFAULT_LLM_MODEL:-claude-opus-4-8}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-dev-secret-key-change-in-production}
      - MCP_SERVER_URL=http://mcp-server:8100/mcp
      - MAX_CONNECTIONS_PER_PROJECT=5
    volumes:
      - ./apps:/app/apps
      - ./config:/app/config
      - static_files:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      platform-db:
        condition: service_healthy
      mcp-server:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # React frontend (nginx serving SPA, proxying /api to Django)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Cube Core semantic layer (REST :4000, SQL API pg-wire :15432)
  # Connects to the managed DB where tenant schemas (t_<id>, ws_<hash>) live.
  # In dev that is the same platform-db; in production point CUBEJS_DB_* at
  # the separate managed-data Postgres (matching MANAGED_DATABASE_URL).
  cube:
    image: cubejs/cube:latest
    ports:
      - "4000:4000"      # REST API / Playground
      - "15432:15432"    # SQL API (pg-wire)
    environment:
      CUBEJS_DEV_MODE: "true"
      CUBEJS_DB_TYPE: postgres
      CUBEJS_DB_HOST: platform-db
      CUBEJS_DB_PORT: "5432"
      CUBEJS_DB_NAME: agent_platform
      CUBEJS_DB_USER: platform
      CUBEJS_DB_PASS: ${PLATFORM_DB_PASSWORD:-devpassword}
      CUBEJS_API_SECRET: ${CUBEJS_API_SECRET}
      CUBEJS_PG_SQL_PORT: "15432"
    volumes:
      - ./cube:/cube/conf
    depends_on:
      platform-db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  platform_data:
  static_files:
