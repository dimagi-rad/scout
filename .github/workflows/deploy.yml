name: Deploy Scout (Production)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.SCOUT_GITHUB_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Kamal
        run: gem install kamal

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Prime env vars from AWS
        run: |
          ./scripts/fetch-deploy-env.sh
          grep -v '^#' .env.deploy >> $GITHUB_ENV

      - name: Deploy MCP
        run: kamal deploy -c config/deploy-mcp.yml

      - name: Deploy API
        run: kamal deploy

      - name: Deploy Worker
        run: kamal deploy -c config/deploy-worker.yml

      - name: Deploy Frontend
        run: kamal deploy -c config/deploy-frontend.yml
