cubes:
- name: visits
  sql_table: '{COMPILE_CONTEXT.security_context.schema_name}.stg_visits'
  dimensions:
  - name: visit_id
    sql: visit_id
    type: string
    primary_key: true
  - name: status
    sql: status
    type: string
    title: Visit Status
  - name: username
    sql: username
    type: string
    title: FLW Username
  - name: flagged
    sql: flagged::text
    type: string
    title: Flagged
  - name: visit_date
    sql: visit_date
    type: time
    title: Visit Date
  measures:
  - name: count
    type: count
    title: Total Visits
  - name: approval_rate
    type: number
    sql: AVG(CASE WHEN status = 'approved' THEN 1.0 ELSE 0 END)
    title: Approval Rate
    description: Fraction of visits in approved status
  - name: muac_confirmation_rate
    type: number
    sql: AVG(CASE WHEN muac_confirmed = 'yes' THEN 1.0 ELSE 0 END)
    title: MUAC Confirmation Rate
    description: Fraction of visits where MUAC was confirmed
