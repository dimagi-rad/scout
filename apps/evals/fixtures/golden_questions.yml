# Seed golden questions for the Scout free-SQL vs Cube adoption eval loop.
#
# Domain: CommCare Connect MUAC/CHW (Community Health Worker) programme —
# synthetic or real opportunity data covering child nutritional screening,
# flagged-visit analysis, payment reconciliation, and CHW performance tracking.
#
# Fields:
#   title:            Short human-readable label (unique within the seed set).
#   question:         The natural-language question posed to both the free-SQL
#                     and Cube semantic paths.
#   reference_sql:    (Optional) A baseline SQL that correctly answers the
#                     question. Describes the intent; not asserted against live
#                     numbers.
#   expected_summary: Plain-language description of the expected answer shape —
#                     what a correct answer looks like (not an exact value).
#   source:           "seed" — identifies these as fixture records, not user-
#                     supplied or extracted from real chat threads.

- title: Total MUAC screenings
  question: How many MUAC screenings have been conducted in total?
  reference_sql: "SELECT COUNT(*) AS total_screenings FROM raw_forms WHERE form_type = 'muac_screening'"
  expected_summary: >
    A single integer representing the total count of all MUAC screening form
    submissions. Should be a non-negative number; zero if no data has been
    materialized yet.
  source: seed

- title: Active CHWs this month
  question: How many CHWs have submitted at least one form this month?
  reference_sql: >
    SELECT COUNT(DISTINCT user_id) AS active_chws
    FROM raw_forms
    WHERE submitted_at >= date_trunc('month', CURRENT_DATE)
  expected_summary: >
    A single integer: the count of distinct CHW user IDs with at least one
    form submission in the current calendar month. Varies with the dataset.
  source: seed

- title: Flagged visits by week
  question: How many flagged (SAM/MAM) visits occurred per week over the last 4 weeks?
  reference_sql: >
    SELECT
        date_trunc('week', submitted_at) AS week_start,
        COUNT(*) AS flagged_visits
    FROM raw_forms
    WHERE form_type = 'muac_screening'
      AND muac_status IN ('SAM', 'MAM')
      AND submitted_at >= CURRENT_DATE - INTERVAL '28 days'
    GROUP BY 1
    ORDER BY 1
  expected_summary: >
    Up to 4 rows (one per ISO week), each with a week_start date and a count
    of SAM or MAM-flagged visits. Rows are ordered chronologically.
  source: seed

- title: CHW screening rate by worker
  question: >
    What is the average number of MUAC screenings per CHW over the last 30 days,
    broken down by individual worker?
  reference_sql: >
    SELECT
        user_id,
        COUNT(*) AS screenings
    FROM raw_forms
    WHERE form_type = 'muac_screening'
      AND submitted_at >= CURRENT_DATE - INTERVAL '30 days'
    GROUP BY user_id
    ORDER BY screenings DESC
  expected_summary: >
    One row per CHW who submitted at least one MUAC screening in the last 30 days,
    with a screening count. List is ordered highest-to-lowest. A mean or aggregate
    across workers is also acceptable.
  source: seed

- title: Payment reconciliation status
  question: >
    How many Connect payment units have been approved, pending, or rejected
    for the current payment cycle?
  reference_sql: >
    SELECT
        status,
        COUNT(*) AS units
    FROM raw_payment_units
    GROUP BY status
    ORDER BY status
  expected_summary: >
    Three rows (or fewer if some statuses have zero units) showing the count
    for each payment status: approved, pending, rejected. Values reflect the
    current state of the payment_units table.
  source: seed

- title: SAM children under 2 years
  question: How many children under 2 years old have been screened as SAM this month?
  reference_sql: >
    SELECT COUNT(*) AS sam_under_2
    FROM raw_cases
    WHERE case_type = 'child'
      AND muac_status = 'SAM'
      AND age_months < 24
      AND last_modified_at >= date_trunc('month', CURRENT_DATE)
  expected_summary: >
    A single integer count of child cases that are under 24 months old and
    have a SAM MUAC classification in the current month.
  source: seed

- title: CHW with most referrals
  question: Which CHW has made the most referrals to health facilities this quarter?
  reference_sql: >
    SELECT
        user_id,
        COUNT(*) AS referrals
    FROM raw_forms
    WHERE form_type = 'muac_screening'
      AND referred_to_facility = true
      AND submitted_at >= date_trunc('quarter', CURRENT_DATE)
    GROUP BY user_id
    ORDER BY referrals DESC
    LIMIT 1
  expected_summary: >
    A single row identifying the CHW (by user_id or name) with the highest
    number of facility referrals this quarter, plus the referral count.
  source: seed

- title: Screening completion rate vs target
  question: >
    What percentage of the assigned CHW caseload has received a MUAC screening
    in the last 7 days?
  reference_sql: >
    SELECT
        ROUND(
            100.0 * COUNT(DISTINCT screened.case_id) / NULLIF(COUNT(DISTINCT all_cases.id), 0),
            1
        ) AS completion_pct
    FROM raw_cases AS all_cases
    LEFT JOIN (
        SELECT DISTINCT case_id
        FROM raw_forms
        WHERE form_type = 'muac_screening'
          AND submitted_at >= CURRENT_DATE - INTERVAL '7 days'
    ) AS screened ON all_cases.id = screened.case_id
    WHERE all_cases.case_type = 'child'
  expected_summary: >
    A single float (0–100) representing the percentage of child cases that
    received a screening visit in the last 7 days. Answer is null or 0 if
    no cases or no screenings exist.
  source: seed

- title: Monthly trend in MAM cases
  question: How has the count of MAM-classified children changed month over month for the past 6 months?
  reference_sql: >
    SELECT
        to_char(date_trunc('month', submitted_at), 'YYYY-MM') AS month,
        COUNT(*) AS mam_cases
    FROM raw_forms
    WHERE form_type = 'muac_screening'
      AND muac_status = 'MAM'
      AND submitted_at >= CURRENT_DATE - INTERVAL '6 months'
    GROUP BY 1
    ORDER BY 1
  expected_summary: >
    Up to 6 rows (one per calendar month), each with a month label and a count
    of MAM classifications. Shows whether caseload is growing, stable, or declining.
  source: seed

- title: Outstanding payments by CHW
  question: Which CHWs have outstanding (unpaid/pending) payments and for how many units each?
  reference_sql: >
    SELECT
        chw_id,
        COUNT(*) AS pending_units,
        SUM(amount) AS pending_amount
    FROM raw_payment_units
    WHERE status = 'pending'
    GROUP BY chw_id
    ORDER BY pending_units DESC
  expected_summary: >
    One row per CHW with at least one pending payment unit, showing the number
    of pending units and the total outstanding amount. List ordered by most units
    outstanding first.
  source: seed
