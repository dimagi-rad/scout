AWSTemplateFormatVersion: '2010-09-09'
Description: Scout production infrastructure (EC2 + Kamal). Does NOT cover the connect-labs deploy.

# ─────────────────────────────────────────────────────────────────────────────
# DEPLOY-TARGET DRIFT — READ BEFORE ASSUMING THIS DESCRIBES EVERY ENVIRONMENT
# (issue #248, 11#1, documentation-only)
#
# This template describes the *Scout production* stack only: a single EC2
# instance running all containers via Kamal, plus RDS + ElastiCache, in the
# Scout-owned AWS account. It is deployed as the `scout-production` stack by
# `.github/workflows/deploy.yml`.
#
# The *connect-labs* deployment is a DIFFERENT, OUT-OF-REPO target:
#   - ECS Fargate (cluster `labs-jj-cluster`, services labs-jj-scout-web /
#     -mcp / -worker), NOT EC2/Kamal.
#   - A separate AWS account: 858923557655 (ECR registry
#     858923557655.dkr.ecr.us-east-1.amazonaws.com).
#   - Served under the /scout path prefix (FORCE_SCRIPT_NAME, see
#     config/settings/connectlabs.py + frontend/nginx.prod.conf).
#   - Deployed by `.github/workflows/deploy-labs.yml`, which only builds and
#     pushes images + updates ECS services; the Fargate task definitions,
#     ALB, networking, and IAM for that account live OUTSIDE this repository.
#
# There is therefore no single CloudFormation/IaC source of truth for the labs
# environment in this repo. Changes to networking, task definitions, or the ALB
# for connect-labs must be made in that external infra, not here. See
# DEPLOYMENT.md ("Connect-labs (ECS Fargate)") for the fuller note.
# ─────────────────────────────────────────────────────────────────────────────

Parameters:
  EC2KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: SSH key pair for EC2 instance (used by Kamal for deploys)

  EC2InstanceType:
    Type: String
    Default: t3.medium
    AllowedValues: [t3.micro, t3.small, t3.medium, t3.large]

  DBInstanceClass:
    Type: String
    Default: db.t4g.micro
    AllowedValues: [db.t4g.micro, db.t4g.small, db.t4g.medium]

  CacheNodeType:
    Type: String
    Default: cache.t4g.micro
    AllowedValues: [cache.t4g.micro, cache.t4g.small, cache.t4g.medium]

  AlarmEmail:
    Type: String
    Description: >-
      Email address that receives CloudWatch alarm notifications (subscription
      must be confirmed via the email AWS sends). Leave blank to skip the
      subscription (alarms still fire to the SNS topic).
    Default: ''

Conditions:
  HasAlarmEmail: !Not [!Equals [!Ref AlarmEmail, '']]

Resources:

  # ── VPC & Networking ──────────────────────────────────────────────

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: scout-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  GatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: scout-public-a

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: scout-public-b

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: GatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetARouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  SubnetBRouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  # ── Security Groups ──────────────────────────────────────────────

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Scout EC2 instance
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH (key-only auth, required by Kamal)
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP (Kamal proxy redirect)
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS (Kamal proxy)
      Tags:
        - Key: Name
          Value: scout-ec2-sg

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Scout RDS access
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref EC2SecurityGroup
          Description: PostgreSQL from EC2 only
      Tags:
        - Key: Name
          Value: scout-rds-sg

  RedisSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Scout ElastiCache access
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          SourceSecurityGroupId: !Ref EC2SecurityGroup
          Description: Redis from EC2 only
      Tags:
        - Key: Name
          Value: scout-redis-sg

  # ── EC2 Instance ─────────────────────────────────────────────────

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: scout-ec2-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: scout-cloudwatch-logs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogStreams
                Resource:
                  - !Sub '${ApiLogGroup.Arn}:*'
                  - !Sub '${McpLogGroup.Arn}:*'
                  - !Sub '${WorkerLogGroup.Arn}:*'
                  - !Sub '${FrontendLogGroup.Arn}:*'

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref EC2InstanceType
      ImageId: !Sub '{{resolve:ssm:/aws/service/canonical/ubuntu/server/24.04/stable/current/amd64/hvm/ebs-gp3/ami-id}}'
      KeyName: !Ref EC2KeyPairName
      SubnetId: !Ref PublicSubnetA
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      # Require IMDSv2: a metadata GET only succeeds after a PUT obtains a session
      # token, so a GET-only app-layer SSRF (e.g. a loader following a server-
      # supplied next URL) can't reach 169.254.169.254/.../iam/security-credentials
      # to steal the scout-ec2-role credentials (arch 10#8). HopLimit 1 keeps IMDS
      # off Docker bridge networks; the awslogs log driver reads IMDS from the host
      # daemon (hop 0), so container logging is unaffected.
      MetadataOptions:
        HttpTokens: required
        HttpEndpoint: enabled
        HttpPutResponseHopLimit: 1
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 50
            VolumeType: gp3
      UserData:
        Fn::Base64: |
          #!/bin/bash
          set -euo pipefail

          # System packages
          apt-get update
          apt-get install -y apt-transport-https ca-certificates curl \
            software-properties-common gnupg unzip \
            postgresql-client-common postgresql-client-16

          # Docker
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
            -o /etc/apt/keyrings/docker.asc
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] \
            https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" \
            > /etc/apt/sources.list.d/docker.list
          apt-get update
          apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin

          # Deploy user
          useradd -m -s /bin/bash scout
          usermod -aG docker scout

          # uv (Python package manager)
          curl -LsSf https://astral.sh/uv/install.sh | sudo -u scout bash
      Tags:
        - Key: Name
          Value: scout-web

  ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      InstanceId: !Ref EC2Instance

  # ── RDS PostgreSQL ───────────────────────────────────────────────

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Scout RDS subnets
      SubnetIds:
        - !Ref PublicSubnetA
        - !Ref PublicSubnetB

  RDSInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    Properties:
      DBInstanceIdentifier: scout-db
      Engine: postgres
      EngineVersion: '16'
      DBInstanceClass: !Ref DBInstanceClass
      AllocatedStorage: 20
      MaxAllocatedStorage: 100
      StorageType: gp3
      DBName: agent_platform
      MasterUsername: platform
      ManageMasterUserPassword: true
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      BackupRetentionPeriod: 7
      StorageEncrypted: true
      PubliclyAccessible: false
      Tags:
        - Key: Name
          Value: scout-db

  # ── ElastiCache Redis ────────────────────────────────────────────

  RedisSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      Description: Scout Redis subnets
      SubnetIds:
        - !Ref PublicSubnetA
        - !Ref PublicSubnetB

  RedisCluster:
    Type: AWS::ElastiCache::CacheCluster
    Properties:
      ClusterName: scout-redis
      Engine: redis
      EngineVersion: '7.1'
      CacheNodeType: !Ref CacheNodeType
      NumCacheNodes: 1
      CacheSubnetGroupName: !Ref RedisSubnetGroup
      VpcSecurityGroupIds:
        - !Ref RedisSecurityGroup
      Tags:
        - Key: Name
          Value: scout-redis

  # ── ECR Repositories ─────────────────────────────────────────────

  ECRApi:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: scout/api
      ImageTagMutability: MUTABLE
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [{
              "rulePriority": 1,
              "description": "Keep last 10 images",
              "selection": {
                "tagStatus": "any",
                "countType": "imageCountMoreThan",
                "countNumber": 10
              },
              "action": { "type": "expire" }
            }]
          }

  ECRMcp:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: scout/mcp
      ImageTagMutability: MUTABLE
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [{
              "rulePriority": 1,
              "description": "Keep last 10 images",
              "selection": {
                "tagStatus": "any",
                "countType": "imageCountMoreThan",
                "countNumber": 10
              },
              "action": { "type": "expire" }
            }]
          }

  ECRFrontend:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: scout/frontend
      ImageTagMutability: MUTABLE
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [{
              "rulePriority": 1,
              "description": "Keep last 10 images",
              "selection": {
                "tagStatus": "any",
                "countType": "imageCountMoreThan",
                "countNumber": 10
              },
              "action": { "type": "expire" }
            }]
          }

  # ── CloudWatch Log Groups ───────────────────────────────────────
  # Pre-created so Kamal containers (using the awslogs Docker driver
  # with awslogs-create-group=false) can write streams without needing
  # logs:CreateLogGroup. Retention is enforced here.

  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /scout/api
      RetentionInDays: 30

  McpLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /scout/mcp
      RetentionInDays: 30

  WorkerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /scout/worker
      RetentionInDays: 30

  FrontendLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /scout/frontend
      RetentionInDays: 30

  # ── GitHub OIDC ──────────────────────────────────────────────────

  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1

  GitHubDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: scout-github-deploy
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOIDCProvider
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: repo:dimagi-rad/scout:ref:refs/heads/main
      Policies:
        - PolicyName: scout-deploy-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: '*'
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:PutImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                Resource:
                  - !GetAtt ECRApi.Arn
                  - !GetAtt ECRMcp.Arn
                  - !GetAtt ECRFrontend.Arn
              # Secrets the deploy actually reads: the scout-db master secret by
              # its exact ARN (NOT rds!*, which would match every RDS master
              # password in the account — arch 10#9), plus the scout-namespaced
              # prefixes kamal fetches by name. GetSecretValue also covers the RDS
              # secret because resolve-database-url.sh reads it directly.
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !GetAtt RDSInstance.MasterUserSecret.SecretArn
                  - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:scout/*'
                  - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:SCOUT_*'
                  - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:COMMCARE_*'
                  - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:CONNECT_*'
                  - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:OCS_*'
              # `kamal secrets fetch` calls BatchGetSecretValue with an explicit
              # --secret-id-list, so per-secret authorization against these
              # prefixes is enough — no need for the account-wide Resource '*'
              # this replaces (arch 10#9). The RDS secret is read via
              # GetSecretValue above, not batched, so it is not listed here.
              - Effect: Allow
                Action:
                  - secretsmanager:BatchGetSecretValue
                Resource:
                  - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:SCOUT_*'
                  - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:COMMCARE_*'
                  - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:CONNECT_*'
                  - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:OCS_*'

  # ── Observability / detection layer (arch #257, finding 08#7) ────
  # The stack previously created log groups but NOTHING converted a dead
  # worker/MCP/process or a destructive operation into an operator signal.
  # This block adds: an SNS alert topic, metric filters that turn the
  # structured application logs (the destruction logs added in apps/
  # workspaces/tasks.py + the audit trail) into CloudWatch metrics, and a
  # minimal, grounded alarm set. Thresholds are conservative starting points
  # — tune them against real traffic.

  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: scout-alerts
      DisplayName: Scout Alerts

  AlertEmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasAlarmEmail
    Properties:
      TopicArn: !Ref AlertTopic
      Protocol: email
      Endpoint: !Ref AlarmEmail

  # ── Metric filters: structured app logs -> CloudWatch metrics ──────
  # ERROR-level lines from each container. Counts let us alarm on an error
  # spike that Sentry's per-event view does not aggregate into a rate.

  ApiErrorMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref ApiLogGroup
      FilterPattern: 'ERROR'
      MetricTransformations:
        - MetricNamespace: Scout/App
          MetricName: ApiErrorCount
          MetricValue: '1'
          DefaultValue: 0

  WorkerErrorMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref WorkerLogGroup
      FilterPattern: 'ERROR'
      MetricTransformations:
        - MetricNamespace: Scout/App
          MetricName: WorkerErrorCount
          MetricValue: '1'
          DefaultValue: 0

  McpErrorMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref McpLogGroup
      FilterPattern: 'ERROR'
      MetricTransformations:
        - MetricNamespace: Scout/App
          MetricName: McpErrorCount
          MetricValue: '1'
          DefaultValue: 0

  # Liveness signal: every worker task logs at least at INFO, so a healthy
  # worker emits a steady stream of log events. Count ALL worker log events;
  # a drop to zero (alarmed below with TreatMissingData: breaching) means the
  # worker process is dead/stuck — the 2026-06-09 silent-failure mode.
  WorkerHeartbeatMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref WorkerLogGroup
      FilterPattern: ''
      MetricTransformations:
        - MetricNamespace: Scout/App
          MetricName: WorkerLogEvents
          MetricValue: '1'
          DefaultValue: 0

  # Destructive-operation counter: the successful DROP SCHEMA CASCADE log line
  # added in apps/workspaces/tasks.py. Surfacing it as a metric makes a teardown
  # storm (e.g. the 2026-06-10 mass-drop) visible and alarmable.
  SchemaDropMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref WorkerLogGroup
      FilterPattern: 'DROP SCHEMA CASCADE succeeded'
      MetricTransformations:
        - MetricNamespace: Scout/App
          MetricName: SchemaDropCount
          MetricValue: '1'
          DefaultValue: 0

  # ── Alarms ─────────────────────────────────────────────────────────

  # Worker silence = process death. A healthy worker logs continuously; if no
  # log events arrive for 15 minutes, the metric reports no data, which we
  # treat as breaching so a dead worker that emits NOTHING still alarms.
  WorkerSilenceAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: scout-worker-silent
      AlarmDescription: >-
        Worker has emitted no log events for 15 minutes — the process is likely
        dead or stuck (2026-06-09 silent-failure mode). TreatMissingData is
        breaching because a dead worker emits nothing at all.
      Namespace: Scout/App
      MetricName: WorkerLogEvents
      Statistic: Sum
      Period: 900
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      AlarmActions: [!Ref AlertTopic]
      OKActions: [!Ref AlertTopic]

  WorkerErrorRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: scout-worker-errors
      AlarmDescription: Worker is logging ERRORs at an elevated rate.
      Namespace: Scout/App
      MetricName: WorkerErrorCount
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertTopic]

  ApiErrorRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: scout-api-errors
      AlarmDescription: API container is logging ERRORs at an elevated rate.
      Namespace: Scout/App
      MetricName: ApiErrorCount
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertTopic]

  # Mass schema-drop: more than 5 DROP SCHEMA CASCADE in 15 min is a teardown
  # storm worth a human look (the 2026-06-10 incident dropped data-bearing
  # schemas in a tight loop).
  SchemaDropStormAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: scout-schema-drop-storm
      AlarmDescription: >-
        More than 5 schemas were dropped in 15 minutes — possible runaway TTL
        teardown of data-bearing schemas (arch #257 / 2026-06-10 incident).
      Namespace: Scout/App
      MetricName: SchemaDropCount
      Statistic: Sum
      Period: 900
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertTopic]

  # ── Infrastructure-health alarms (EC2 + RDS) ──────────────────────

  EC2StatusCheckAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: scout-ec2-status-check-failed
      AlarmDescription: The EC2 instance hosting all Scout containers failed its status check.
      Namespace: AWS/EC2
      MetricName: StatusCheckFailed
      Dimensions:
        - Name: InstanceId
          Value: !Ref EC2Instance
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 3
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: breaching
      AlarmActions: [!Ref AlertTopic]

  RDSCpuAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: scout-rds-high-cpu
      AlarmDescription: RDS CPU sustained above 85%.
      Namespace: AWS/RDS
      MetricName: CPUUtilization
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Ref RDSInstance
      Statistic: Average
      Period: 300
      EvaluationPeriods: 3
      Threshold: 85
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertTopic]

  RDSLowStorageAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: scout-rds-low-storage
      AlarmDescription: RDS free storage below 2 GiB.
      Namespace: AWS/RDS
      MetricName: FreeStorageSpace
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Ref RDSInstance
      Statistic: Minimum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 2147483648
      ComparisonOperator: LessThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertTopic]

Outputs:
  EC2PublicIP:
    Description: EC2 Elastic IP (use in Kamal configs and DNS)
    Value: !Ref ElasticIP

  RDSEndpoint:
    Description: RDS endpoint (use in DATABASE_URL)
    Value: !GetAtt RDSInstance.Endpoint.Address

  RDSSecretArn:
    Description: RDS-managed secret ARN (contains master password)
    Value: !GetAtt RDSInstance.MasterUserSecret.SecretArn

  RedisEndpoint:
    Description: ElastiCache endpoint (use in REDIS_URL)
    Value: !GetAtt RedisCluster.RedisEndpoint.Address

  ECRRegistry:
    Description: ECR registry URL (use in Kamal registry.server)
    Value: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com'

  GitHubDeployRoleArn:
    Description: IAM role ARN for GitHub Actions OIDC (use in workflow)
    Value: !GetAtt GitHubDeployRole.Arn

  AlertTopicArn:
    Description: SNS topic that receives CloudWatch alarm notifications
    Value: !Ref AlertTopic
